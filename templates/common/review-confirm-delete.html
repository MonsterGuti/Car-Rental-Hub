{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card border-danger mx-auto" style="max-width: 500px;">
        <div class="card-body text-center">
            <h3>Delete Review?</h3>
            <p>Are you sure you want to delete the review by <strong>{{ object.customer_name }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Confirm Delete</button>
                <a href="{% url 'common:review-list' %}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
