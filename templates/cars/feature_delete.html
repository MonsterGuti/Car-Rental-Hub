{% extends 'base.html' %}

{% block content %}

<h2>Delete Feature</h2>

<p>Are you sure you want to delete <b>{{ feature.name }}</b>?</p>

<form method="post">
    {% csrf_token %}

    <button class="btn btn-danger">Confirm Delete</button>

    <a href="{% url 'cars:feature-detail' feature.pk %}" class="btn btn-secondary">
        Cancel
    </a>

</form>

{% endblock %}
