{% extends 'base.html' %}

{% block content %}

<h2>Features</h2>

<a href="{% url 'cars:feature-create' %}" class="btn btn-primary mb-3">
    Add Feature
</a>

<ul class="list-group">

{% for feature in features %}

<li class="list-group-item d-flex justify-content-between">

    {{ feature.name }}

    <span>
        <a href="{% url 'cars:feature-detail' feature.pk %}" class="btn btn-info btn-sm">View</a>
        <a href="{% url 'cars:feature-update' feature.pk %}" class="btn btn-warning btn-sm">Edit</a>
        <a href="{% url 'cars:feature-delete' feature.pk %}" class="btn btn-danger btn-sm">Delete</a>
    </span>

</li>

{% empty %}

<li class="list-group-item">No features added yet.</li>

{% endfor %}

</ul>

{% endblock %}
