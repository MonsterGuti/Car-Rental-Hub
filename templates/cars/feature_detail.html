{% extends 'base.html' %}

{% block content %}

<h2>{{ feature.name }}</h2>

<div class="mt-3">
    {% if user.is_authenticated and user.is_staff or user.is_superuser %}
        <a href="{% url 'cars:feature-update' feature.pk %}" class="btn btn-warning">
            Edit
        </a>

        <a href="{% url 'cars:feature-delete' feature.pk %}" class="btn btn-danger">
            Delete
        </a>
    {% endif %}

    <a href="{% url 'cars:feature-list' %}" class="btn btn-secondary">
        Back
    </a>
</div>

{% endblock %}
