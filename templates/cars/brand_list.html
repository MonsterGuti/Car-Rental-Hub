{% extends 'base.html' %}

{% block content %}
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="display-5 fw-bold text-dark">Car Brands</h2>
                <p class="text-muted">Manage the manufacturers in your car rental catalog.</p>
            </div>
            <a href="{% url 'cars:brand-create' %}" class="btn btn-primary shadow-sm">
                <i class="bi bi-plus-circle"></i> Add New Brand
            </a>
        </div>

        <div class="row">
            {% for brand in brands %}
                <div class="col-md-4 mb-4">
                    <div class="card h-100 shadow-sm border-0 brand-card">
                        <div class="card-body">
                            <div class="d-flex align-items-center mb-3">
                                <div class="brand-icon bg-soft-primary text-primary rounded-circle p-3 me-3">
                                    <i class="bi bi-patch-check-fill fs-3"></i>
                                </div>
                                <div>
                                    <h4 class="card-title mb-0 fw-bold">{{ brand.name }}</h4>
                                    <span class="badge bg-light text-muted border small">
                                    <i class="bi bi-geo-alt"></i> {{ brand.country }}
                                </span>
                                </div>
                            </div>

                        </div>

                        <div class="card-footer bg-transparent border-0 pb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <a href="{% url 'cars:brand-detail' brand.pk %}"
                                   class="btn btn-outline-info btn-sm px-3">
                                    <i class="bi bi-info-circle"></i> Details
                                </a>
                                <div class="btn-group">
                                    <a href="{% url 'cars:brand-update' brand.pk %}"
                                       class="btn btn-light btn-sm text-warning" title="Edit">
                                        <i class="bi bi-pencil-square"></i>
                                    </a>
                                    <a href="{% url 'cars:brand-delete' brand.pk %}"
                                       class="btn btn-light btn-sm text-danger" title="Delete">
                                        <i class="bi bi-trash"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            {% empty %}
                <div class="col-12 text-center py-5">
                    <div class="text-muted">
                        <i class="bi bi-building-x display-1 text-light"></i>
                        <p class="mt-3 fs-5 text-muted">No brands found. Start by adding a new manufacturer.</p>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
