{% extends 'base.html' %}

{% block content %}

<h2>Car Brands</h2>

<a href="{% url 'cars:brand-create' %}" class="btn btn-primary mb-3">
    Add Brand
</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Country</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody>
        {% for brand in brands %}
        <tr>
            <td>{{ brand.name }}</td>
            <td>{{ brand.country }}</td>
            <td>
                <a href="{% url 'cars:brand-detail' brand.pk %}" class="btn btn-info btn-sm">View</a>
                <a href="{% url 'cars:brand-update' brand.pk %}" class="btn btn-warning btn-sm">Edit</a>
                <a href="{% url 'cars:brand-delete' brand.pk %}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No brands available.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
